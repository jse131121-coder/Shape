<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHAPE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F2E6FF; color: #1E0A40; margin: 0; padding: 0; overflow: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .bubble-popup {
            position: absolute; top: 110px; right: 20px; background: white; border-radius: 40px;
            padding: 30px; width: 300px; z-index: 100; border: 4px solid #1E0A40; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }
        .bubble-popup::after {
            content: ''; position: absolute; top: -22px; right: 30px;
            border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 20px solid #1E0A40;
        }
        .chat-me { border-radius: 20px 4px 20px 20px; background-color: #1E0A40; color: white; }
        .chat-other { border-radius: 4px 20px 20px 20px; background-color: white; color: #1E0A40; }
        input { font-size: 16px !important; } /* iOS 줌 방지 */
    </style>
</head>
<body class="flex justify-center items-center h-screen bg-gray-200">

    <div id="app" class="w-full max-w-[450px] h-full bg-[#F2E6FF] flex flex-col relative overflow-hidden md:h-[95vh] md:rounded-[3rem] md:border-[10px] md:border-white shadow-2xl">
        
        <header class="flex items-center justify-between p-5 bg-white/60 backdrop-blur-md border-b border-purple-100 z-[60]">
            <h1 class="text-3xl font-[900] tracking-tighter cursor-pointer" onclick="showView('list')">SHAPE</h1>
            <button onclick="showView('login')" class="bg-gradient-to-br from-[#E2B7FD] to-[#A855F7] text-white px-6 py-2 rounded-2xl font-bold shadow-md active:scale-95 transition-all text-sm">MAKE</button>
        </header>

        <main id="main-content" class="flex-1 overflow-y-auto hide-scroll relative">
            </main>

        <div id="popup-overlay" class="hidden absolute inset-0 bg-black/20 z-[70]" onclick="togglePopup()"></div>
        <div id="add-chat-popup" class="hidden bubble-popup z-[80]">
            <div class="space-y-4">
                <div><label class="block font-black mb-1 ml-2">채팅 초대자</label><input type="text" class="w-full bg-[#1E0A40] rounded-full p-3 text-white outline-none"></div>
                <div><label class="block font-black mb-1 ml-2">채팅방 이름</label><input type="text" class="w-full bg-[#1E0A40] rounded-full p-3 text-white outline-none"></div>
                <button onclick="togglePopup()" class="w-full py-2 bg-[#E2B7FD] rounded-full font-black text-[#1E0A40] mt-2">생성하기</button>
            </div>
        </div>

        <footer id="nav-bar" class="w-full h-20 bg-white border-t border-purple-100 flex justify-around items-center z-[60]">
            <button onclick="showView('list')" id="nav-chat" class="flex flex-col items-center gap-1 text-[#1E0A40]">
                <i data-lucide="message-circle" class="w-7 h-7"></i><span class="text-xs font-bold">채팅</span>
            </button>
            <button onclick="showView('setting')" id="nav-set" class="flex flex-col items-center gap-1 text-gray-300">
                <i data-lucide="settings" class="w-7 h-7"></i><span class="text-xs font-bold">설정</span>
            </button>
        </footer>

        <button id="plus-btn" onclick="togglePopup()" class="absolute top-[100px] right-5 w-12 h-12 bg-[#1E0A40] text-white rounded-2xl flex items-center justify-center shadow-lg z-50">
            <i data-lucide="plus"></i>
        </button>
    </div>

    <script>
        const content = document.getElementById('main-content');
        const plusBtn = document.getElementById('plus-btn');
        const navBar = document.getElementById('nav-bar');

        const USERS = {
            GARIN: { name: 'GARIN', color: 'bg-[#FFB5E8]' },
            REINA: { name: 'REINA', color: 'bg-[#B5EAD7]' },
            HANSEOL: { name: 'HANSEOL', color: 'bg-[#C7CEEA]' },
            RIEH: { name: 'RIEH', color: 'bg-[#FFDAC1]' }
        };

        let currentChatRoom = "KILLIN'";
        let chatMessages = [
            { user: USERS.REINA, text: "❕", time: "17:10" },
            { user: USERS.HANSEOL, text: "😎", time: "17:12" }
        ];

        function showView(view) {
            plusBtn.style.display = (view === 'list') ? 'flex' : 'none';
            navBar.style.display = (view === 'chat') ? 'none' : 'flex';
            
            document.getElementById('nav-chat').classList.toggle('text-[#1E0A40]', view === 'list');
            document.getElementById('nav-chat').classList.toggle('text-gray-300', view !== 'list');
            document.getElementById('nav-set').classList.toggle('text-[#1E0A40]', view === 'setting');
            document.getElementById('nav-set').classList.toggle('text-gray-300', view !== 'setting');

            if(view === 'list') {
                content.innerHTML = `
                    <div class="p-4 space-y-4 mt-16 pb-24">
                        ${renderListItem("KILLIN'", "가린, 레이나, 한설, 리에", "https://i.pravatar.cc/150?u=kil")}
                        ${renderListItem("Shape", "공식 채팅방", "https://i.pravatar.cc/150?u=sha")}
                        ${renderListItem("LUCA FAN", "최근 내용 없음", "")}
                        ${renderListItem("ARCADE", "최근 내용 없음", "")}
                    </div>`;
            } else if(view === 'setting') {
                content.innerHTML = `
                    <div class="p-8 space-y-6">
                        <div><label class="font-black">NEW NAME</label><div class="h-14 bg-[#1E0A40] rounded-[20px] mt-2"></div></div>
                        <div><label class="font-black">NEW PHOTO</label><div class="h-14 bg-[#1E0A40] rounded-[20px] mt-2 flex items-center px-6"><i data-lucide="cloud" class="text-white"></i></div></div>
                        <div><label class="font-black">NEW ID</label><div class="h-14 bg-[#1E0A40] rounded-[20px] mt-2"></div></div>
                        <div><label class="font-black">NEW PW</label><div class="h-14 bg-[#1E0A40] rounded-[20px] mt-2"></div></div>
                    </div>`;
            } else if(view === 'login') {
                content.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full p-8 pb-32">
                        <div class="bubble-popup !static !w-full !translate-y-0">
                            <div class="space-y-4">
                                <div><label class="font-black">ID</label><input type="text" class="w-full bg-[#1E0A40] rounded-full p-3 text-white outline-none"></div>
                                <div><label class="font-black">PW</label><input type="password" class="w-full bg-[#1E0A40] rounded-full p-3 text-white outline-none"></div>
                                <button onclick="showView('list')" class="w-full py-3 bg-[#1E0A40] text-white rounded-full font-black mt-2">LOGIN</button>
                            </div>
                        </div>
                    </div>`;
            } else if(view === 'chat') {
                content.innerHTML = `
                    <div class="flex flex-col h-full bg-[#121212]">
                        <div class="p-4 flex items-center gap-4 bg-[#121212] border-b border-gray-800 sticky top-0 z-20">
                            <button onclick="showView('list')" class="bg-white w-10 h-10 rounded-2xl flex items-center justify-center font-bold">←</button>
                            <div class="w-10 h-10 rounded-full bg-pink-100"></div>
                            <h2 class="text-white font-black text-xl">LUCA</h2>
                        </div>
                        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-6 hide-scroll">
                            <div class="text-center"><span class="bg-white px-4 py-1 rounded-full text-[10px] font-bold">2026.04.16</span></div>
                            <div id="msg-list" class="space-y-6"></div>
                        </div>
                        <div class="p-4 bg-[#121212] flex items-center gap-2">
                            <div class="bg-white w-10 h-10 rounded-2xl flex items-center justify-center"><i data-lucide="camera" class="w-6 text-black"></i></div>
                            <input type="text" id="m-input" placeholder="메시지..." class="flex-1 bg-[#1E1E1E] border border-gray-700 rounded-2xl p-3 text-white outline-none">
                            <button onclick="sendMsg()" class="bg-white text-black px-5 py-2 rounded-2xl font-black">send</button>
                        </div>
                    </div>`;
                renderChatContent();
            }
            lucide.createIcons();
        }

        function renderListItem(name, sub, img) {
            return `<div onclick="showView('chat')" class="bg-[#1E0A40] p-5 rounded-[35px] flex items-center gap-4 shadow-xl active:scale-95 transition-all">
                <div class="w-16 h-16 rounded-2xl bg-white overflow-hidden flex items-center justify-center font-black">${img ? `<img src="${img}">` : 'PIC'}</div>
                <div><h3 class="text-white text-xl font-black">${name}</h3><p class="text-gray-400 text-xs">${sub}</p></div>
            </div>`;
        }

        function renderChatContent() {
            const list = document.getElementById('msg-list');
            if(!list) return;
            list.innerHTML = chatMessages.map(m => `
                <div class="flex ${m.user.name === 'GARIN' ? 'justify-end' : 'justify-start'} items-end gap-2">
                    ${m.user.name !== 'GARIN' ? `<div class="w-9 h-9 rounded-full ${m.user.color} flex-shrink-0"></div>` : ''}
                    <div class="flex flex-col ${m.user.name === 'GARIN' ? 'items-end' : 'items-start'} max-w-[70%]">
                        ${m.user.name !== 'GARIN' ? `<span class="text-white text-[10px] mb-1 font-bold">${m.user.name}</span>` : ''}
                        <div class="px-4 py-2 ${m.user.name === 'GARIN' ? 'chat-me' : 'chat-other'} font-medium shadow-md text-sm leading-relaxed">${m.text}</div>
                        <span class="text-[9px] text-gray-500 mt-1">${m.time}</span>
                    </div>
                </div>
            `).join('');
            const box = document.getElementById('chat-box');
            box.scrollTop = box.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById('m-input');
            if(!input.value.trim()) return;
            chatMessages.push({ user: USERS.GARIN, text: input.value, time: "방금" });
            input.value = '';
            renderChatContent();
        }

        function togglePopup() {
            document.getElementById('add-chat-popup').classList.toggle('hidden');
            document.getElementById('popup-overlay').classList.toggle('hidden');
        }

        showView('list');
        lucide.createIcons();
    </script>
</body>
</html>
