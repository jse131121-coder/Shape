<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHAPE - ARCADE SOCIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8F4FF; color: #1E0A40; margin: 0; padding: 0; overflow: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .chat-me { border-radius: 22px 4px 22px 22px; background-color: #1E0A40; color: white; }
        .chat-other { border-radius: 4px 22px 22px 22px; background-color: #FFFFFF; color: #1E0A40; border: 1.5px solid #F0F0F0; }
        
        .star-badge {
            width: 18px; height: 18px; background-color: #A855F7;
            clip-path: polygon(100% 50%, 94.45% 69.45%, 79.45% 84.45%, 60.45% 91.45%, 39.55% 91.45%, 20.55% 84.45%, 5.55% 69.45%, 0% 50%, 5.55% 30.55%, 20.55% 15.55%, 39.55% 8.55%, 60.45% 8.55%, 79.45% 15.55%, 94.45% 30.55%);
            display: flex; align-items: center; justify-content: center; color: white; font-size: 10px;
        }
        
        .delete-btn { opacity: 0.3; transition: opacity 0.2s; cursor: pointer; }
        .delete-btn:hover { opacity: 1; color: #FF4D4D; }
    </style>
</head>
<body class="flex justify-center items-center h-screen bg-gray-100">

    <div id="app" class="w-full max-w-[450px] h-full bg-[#F8F4FF] flex flex-col relative overflow-hidden md:h-[95vh] md:rounded-[3rem] md:border-[10px] md:border-white shadow-2xl">
        
        <header id="main-header" class="flex items-center justify-between p-5 bg-white/90 backdrop-blur-md border-b border-purple-50 z-[60]">
            <h1 class="text-3xl font-[900] tracking-tighter cursor-pointer" onclick="showView('list')">SHAPE</h1>
            <button id="logout-btn" onclick="handleLogout()" class="bg-gray-100 text-[#1E0A40] px-4 py-2 rounded-xl font-bold text-xs uppercase">Logout</button>
        </header>

        <main id="main-content" class="flex-1 overflow-y-auto hide-scroll relative bg-[#F8F4FF]"></main>

        <div id="popup-overlay" class="hidden absolute inset-0 bg-black/10 z-[70]" onclick="togglePopup()"></div>
        <div id="add-chat-popup" class="hidden absolute top-[110px] right-5 bg-white border-4 border-[#1E0A40] rounded-[40px] p-8 w-[300px] z-[80] shadow-2xl text-left">
            <div class="space-y-4">
                <div><label class="block font-black mb-1 text-xs ml-2 uppercase">Room Name</label><input type="text" id="new-room-name" class="w-full bg-[#1E0A40] rounded-full p-3 text-white outline-none text-sm uppercase font-bold px-5"></div>
                <button onclick="addNewRoom()" class="w-full py-3 bg-[#E2B7FD] rounded-full font-black text-[#1E0A40] mt-2 uppercase">Create</button>
            </div>
        </div>

        <footer id="nav-bar" class="w-full h-20 bg-white border-t border-purple-50 flex justify-around items-center z-[60]">
            <button onclick="showView('list')" id="nav-chat" class="flex flex-col items-center gap-1 text-[#1E0A40]"><i data-lucide="message-circle" class="w-7 h-7"></i><span class="text-[10px] font-bold uppercase">Chats</span></button>
            <button onclick="showView('setting')" id="nav-set" class="flex flex-col items-center gap-1 text-gray-300"><i data-lucide="settings" class="w-7 h-7"></i><span class="text-[10px] font-bold uppercase">Setting</span></button>
        </footer>

        <button id="plus-btn" onclick="togglePopup()" class="absolute top-[100px] right-5 w-12 h-12 bg-[#1E0A40] text-white rounded-2xl flex items-center justify-center shadow-lg z-50 hidden active:scale-90 transition-all"><i data-lucide="plus"></i></button>
    </div>

    <script>
        const content = document.getElementById('main-content');
        const plusBtn = document.getElementById('plus-btn');
        const navBar = document.getElementById('nav-bar');
        const logoutBtn = document.getElementById('logout-btn');

        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let chatRooms = JSON.parse(localStorage.getItem('chatRooms')) || [
            { id: 1, name: "ROCADE ARTIST", sub: "REINA, HANSEOL...", messages: [] }
        ];

        function saveData() {
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            localStorage.setItem('chatRooms', JSON.stringify(chatRooms));
        }

        function handleLogin() {
            const idInput = document.getElementById('login-id').value.trim();
            if(!idInput) return alert("ID를 입력하세요!");
            // 초기 로그인 시 기본 프사 설정
            currentUser = { id: idInput, name: idInput, profileImg: `https://i.pravatar.cc/100?u=${idInput}` }; 
            saveData();
            showView('list');
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            showView('login');
        }

        function showView(view, roomId = null) {
            if(!currentUser && view !== 'login') view = 'login';
            plusBtn.classList.add('hidden');
            navBar.style.display = (view === 'login' || view === 'chat') ? 'none' : 'flex';
            logoutBtn.style.display = (view === 'login') ? 'none' : 'block';

            if(view === 'login') {
                content.innerHTML = `<div class="flex flex-col items-center justify-center h-full p-8"><div class="bg-white border-4 border-[#1E0A40] rounded-[40px] p-10 w-full shadow-xl"><h2 class="text-3xl font-[900] mb-8 text-center italic uppercase">Sign In</h2><div class="space-y-5"><input type="text" id="login-id" placeholder="USER ID" class="w-full bg-[#1E0A40] rounded-full p-4 text-white outline-none font-bold uppercase tracking-widest text-center"><button onclick="handleLogin()" class="w-full py-4 bg-[#1E0A40] text-white rounded-full font-black mt-4 uppercase">Enter</button></div></div></div>`;
            } 
            else if(view === 'list') {
                plusBtn.classList.remove('hidden');
                document.getElementById('nav-chat').classList.replace('text-gray-300', 'text-[#1E0A40]');
                document.getElementById('nav-set').classList.replace('text-[#1E0A40]', 'text-gray-300');
                content.innerHTML = `<div class="p-5 space-y-4 mt-16 pb-24">${chatRooms.map(room => `<div onclick="showView('chat', ${room.id})" class="bg-[#1E0A40] p-6 rounded-[35px] flex items-center gap-4 shadow-xl active:scale-95 transition-all"><div class="w-16 h-16 rounded-2xl bg-white flex items-center justify-center font-black text-2xl text-[#1E0A40] uppercase">${room.name[0]}</div><div class="flex-1 text-left overflow-hidden"><h3 class="text-white text-2xl font-[900] tracking-tight uppercase">${room.name}</h3><p class="text-gray-400 text-xs truncate uppercase opacity-60">${room.sub}</p></div></div>`).join('')}</div>`;
            } 
            else if(view === 'setting') {
                document.getElementById('nav-set').classList.replace('text-gray-300', 'text-[#1E0A40]');
                document.getElementById('nav-chat').classList.replace('text-[#1E0A40]', 'text-gray-300');
                content.innerHTML = `
                    <div class="p-8 space-y-8 text-center">
                        <div class="flex flex-col items-center gap-4">
                            <div class="w-32 h-32 rounded-[40px] bg-white border-4 border-[#1E0A40] overflow-hidden shadow-lg relative group">
                                <img id="setting-img-preview" src="${currentUser.profileImg}" class="w-full h-full object-cover">
                                <label class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer text-white">
                                    <i data-lucide="camera" class="w-8 h-8"></i>
                                    <input type="file" class="hidden" onchange="previewProfileImg(this)">
                                </label>
                            </div>
                            <p class="text-[10px] font-black uppercase text-[#1E0A40] opacity-50">Click Image to Change</p>
                        </div>
                        <div class="text-left">
                            <label class="font-black text-lg block uppercase">Profile Name</label>
                            <input type="text" id="set-name" value="${currentUser.name}" class="w-full h-16 bg-[#1E0A40] rounded-[25px] mt-2 px-6 text-white outline-none font-bold text-xl uppercase">
                        </div>
                        <button onclick="saveSettings()" class="w-full py-5 bg-gradient-to-r from-[#E2B7FD] to-[#A855F7] text-white rounded-[25px] font-[900] text-xl uppercase shadow-lg active:scale-95 transition-all">Save Changes</button>
                    </div>`;
            } 
            else if(view === 'chat') {
                let room = chatRooms.find(r => r.id === roomId);
                content.innerHTML = `<div class="flex flex-col h-full bg-white"><div class="p-5 flex items-center gap-4 border-b border-gray-100 sticky top-0 bg-white z-20"><button onclick="showView('list')" class="bg-[#1E0A40] text-white w-10 h-10 rounded-2xl flex items-center justify-center font-bold">←</button><h2 class="text-[#1E0A40] font-[900] text-xl tracking-tighter uppercase">${room.name}</h2></div><div id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-8 hide-scroll pb-10"><div id="msg-list" class="space-y-8 pt-5"></div></div><div class="p-4 flex items-center gap-2 pb-10 border-t border-gray-50"><label class="bg-gray-100 w-14 h-14 rounded-2xl flex items-center justify-center cursor-pointer active:scale-90 transition-all"><i data-lucide="camera" class="w-6 text-[#1E0A40]"></i><input type="file" class="hidden" onchange="sendImage(this, ${roomId})"></label><input type="text" id="m-input" placeholder="Aa" class="flex-1 bg-gray-50 border border-gray-100 rounded-[20px] p-4 text-[#1E0A40] outline-none font-medium"><button onclick="sendMsg(${roomId})" class="bg-[#1E0A40] text-white px-8 py-4 rounded-[20px] font-[900] uppercase active:scale-90 transition-all">Send</button></div></div>`;
                renderChatContent(roomId);
            }
            lucide.createIcons();
        }

        function previewProfileImg(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('setting-img-preview').src = e.target.result;
                    currentUser.profileImg = e.target.result; // 임시 저장
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderChatContent(roomId) {
            const room = chatRooms.find(r => r.id === roomId);
            const list = document.getElementById('msg-list');
            if(!list) return;
            
            list.innerHTML = room.messages.map((m, index) => {
                const isMe = m.senderId === currentUser.id;
                const displayName = m.senderName || m.senderId;
                const isImage = m.type === 'image';
                // 내가 보낸 메시지면 현재 내 프사를, 아니면 저장된 프사 사용
                const profileImg = isMe ? currentUser.profileImg : (m.senderProfile || `https://i.pravatar.cc/100?u=${m.senderId}`);

                if(isMe) {
                    return `<div class="flex justify-end items-end gap-2">
                        <button onclick="deleteMsg(${roomId}, ${index})" class="delete-btn mb-6"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        <div class="flex flex-col items-end max-w-[80%]">
                            <div class="${isImage ? 'p-1' : 'px-5 py-3'} chat-me font-semibold text-[15px] leading-relaxed">
                                ${isImage ? `<img src="${m.content}" class="rounded-2xl max-w-full shadow-sm">` : m.text}
                            </div>
                            <span class="text-[10px] text-gray-400 mt-1 font-bold uppercase">${m.time}</span>
                        </div>
                    </div>`;
                } else {
                    return `<div class="flex justify-start items-start gap-3">
                        <div class="w-11 h-11 rounded-2xl bg-gray-200 border-2 border-white shadow-sm flex items-center justify-center overflow-hidden"><img src="${profileImg}" class="w-full h-full object-cover"></div>
                        <div class="flex flex-col items-start max-w-[80%]">
                            <div class="flex items-center gap-1.5 mb-1.5">
                                <span class="text-[13px] font-[900] text-[#1E0A40] uppercase">${displayName}</span>
                                <div class="star-badge"><i data-lucide="check" class="w-2 h-2"></i></div>
                            </div>
                            <div class="${isImage ? 'p-1' : 'px-5 py-3'} chat-other font-semibold text-[15px] leading-relaxed">
                                ${isImage ? `<img src="${m.content}" class="rounded-2xl max-w-full shadow-sm">` : m.text}
                            </div>
                            <span class="text-[10px] text-gray-400 mt-1 font-bold uppercase">${m.time}</span>
                        </div>
                        <button onclick="deleteMsg(${roomId}, ${index})" class="delete-btn mt-6"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`;
                }
            }).join('');
            const box = document.getElementById('chat-box');
            box.scrollTop = box.scrollHeight;
            lucide.createIcons();
        }

        function sendMsg(roomId) {
            const input = document.getElementById('m-input');
            const room = chatRooms.find(r => r.id === roomId);
            if(!input.value.trim()) return;
            const now = new Date();
            room.messages.push({
                senderId: currentUser.id,
                senderName: currentUser.name,
                senderProfile: currentUser.profileImg, // 현재 프사 정보 저장
                text: input.value,
                time: now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0')
            });
            input.value = '';
            saveData();
            renderChatContent(roomId);
        }

        function sendImage(input, roomId) {
            const room = chatRooms.find(r => r.id === roomId);
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const now = new Date();
                    room.messages.push({
                        senderId: currentUser.id,
                        senderName: currentUser.name,
                        senderProfile: currentUser.profileImg,
                        type: 'image',
                        content: e.target.result,
                        time: now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0')
                    });
                    saveData();
                    renderChatContent(roomId);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function deleteMsg(roomId, msgIndex) {
            if(confirm("DELETE THIS MESSAGE?")) {
                const room = chatRooms.find(r => r.id === roomId);
                room.messages.splice(msgIndex, 1);
                saveData();
                renderChatContent(roomId);
            }
        }

        function saveSettings() {
            const newName = document.getElementById('set-name').value.trim();
            if(!newName) return;
            currentUser.name = newName;
            saveData();
            alert("SUCCESS");
            showView('list');
        }

        function addNewRoom() {
            const name = document.getElementById('new-room-name').value.trim();
            if(!name) return;
            chatRooms.push({ id: Date.now(), name: name, sub: "ADMIN: " + currentUser.name, messages: [] });
            saveData();
            togglePopup();
            showView('list');
        }

        function togglePopup() {
            document.getElementById('add-chat-popup').classList.toggle('hidden');
            document.getElementById('popup-overlay').classList.toggle('hidden');
        }

        showView(currentUser ? 'list' : 'login');
        lucide.createIcons();
    </script>
</body>
</html>
